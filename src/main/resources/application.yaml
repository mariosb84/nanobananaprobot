# Basic Application Settings
spring:
  application:
    name: nanobananaprobot
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false
  # Настройка асинхронных задач для @Async
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100

  # Logging
  logging:
    level:
      root: warn
      org:
        springframework:
          web: error
          security: DEBUG
          # Включим логи для ваших сервисов
      org.example.nanobananaprobot: DEBUG

server:
  port: 9900

# Telegram Bot
tg:
  username: ${TELEGRAM_BOT_USERNAME}
  token: ${TELEGRAM_BOT_TOKEN}

# WebDriver
webdrivermanager:
  cache:
    path: "./drivers"
  download-proxy: "DIRECT"

# YooKassa Payment System
yookassa:
  # real-shop:
  shop-id: ${YOOKASSA_SHOP_ID}
  secret-key: ${YOOKASSA_SECRET_KEY}
  test-mode: false
  # test-shop:
  #shop-id: ${YOOKASSA_SHOP_ID:1181320}
  #secret-key: ${YOOKASSA_SECRET_KEY:test_7AfQYlI0WOQVImchsPcaNkIfQdreb47ttSLDTnSqchA}
  #test-mode: true

# ProxyAPI для DALL-E 3
# ВНИМАНИЕ: Никогда не храните ключи прямо в YAML!
# Используйте переменные окружения: export PROXYAPI_KEY="ваш_ключ"
proxyapi:
  key: ${PROXYAPI_KEY}  # Безопасное хранение ключа

# Application Settings
app:
  payment:
    return-url: "https://t.me/NanoBananaProBot_bot"
  webhook:
    url: "http://localhost:9900/api/payments/webhook/yookassa"
  packages:
    image:
      "3": "39"
      "10": "99"
      "50": "449"
      "100": "799"
      "300": "2099"
    video:
      "1": "50"
      "5": "225"
      "10": "399"
  trial:
    free-generations: "3"
    period-days: "7"
  subscription:
    monthly:
      price: "299.00"
    yearly:
      price: "2490.00"

# URLs
paymentUrl: "https://yoomoney.ru/checkout/payments/v2/contract?orderId="

# Prices and Currency
subscriptionPlanYearly: "2490.00"
subscriptionPlanMonthly: "299.00"
amountMonthly: "299.00"
amountYearly: "2490.00"
amountSetCurrency: "RUB"
currency: " ₽"
currencySecond: "₽"

# API URLs для YooKassa
API_URL: "https://api.yookassa.ru/v3/"
TEST_API_URL: "https://api.yookassa.ru/v3/"

# RestTemplate
rest:
  connection:
    timeout: 5000
  read:
    timeout: 5000

# Настройки для нового ProxyApiImageService
image:
  generation:
    timeout: 30000  # Таймаут для HTTP-клиента
    model: "dall-e-3"  # Используемая модель
    size: "1024x1024"  # Размер изображения
    quality: "standard"  # Качество

higgsfield:
  client-id: ${HIGGSFIELD_CLIENT_ID}
  client-secret: ${HIGGSFIELD_CLIENT_SECRET}
cometapi:
  url: "https://api.cometapi.com/v1beta/models/gemini-3-pro-image-preview:generateContent"
  key: ${COMET_API_KEY}

# Tg Bot Administrators
bot:
  admin:
    user-ids: 409923279,7853979722

# mytax:
mytax:
  inn: ${MYTAX_INN}
  password: ${MYTAX_PASSWORD}

# token value:
token:
